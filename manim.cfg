[CLI]
# --- Directory Settings ---
# Tells Manim where to put the rendered videos and images
media_dir = media

# Tells Manim where to look for your imported images and data files
assets_dir = assets

# --- Output Settings ---
# Set the default rendering quality.
# Options: low_quality (480p15), medium_quality (720p30), high_quality (1080p60), production_quality (1440p60)
quality = high_quality

# Automatically preview (play) the video after it finishes rendering
preview = True

# --- Visual Settings ---
# The default background color. Black is standard, but you can use WHITE for a "whiteboard" vibe.
background_color = #2b3a42

# --- Terminal Settings ---
# Keeps your terminal clean by only showing warnings and the progress bar
verbosity = WARNING
